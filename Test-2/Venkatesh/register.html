<!doctype html>
<html>
  <head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container-fluid auth-wrapper">
      <div class="row auth-box">
        <div
          class="col-md-6 d-flex align-items-center justify-content-center p-4"
        >
          <div class="card auth-card p-4">
            <div class="text-center">
              <i class="bi bi-person-plus-fill" style="font-size: 4rem"></i>
              <h3 class="mt-3 fw-bold">Create Account</h3>
              <p>Join us today</p>
            </div>

            <form id="registerForm">
              <div class="row">
                <div class="col-md-6 mb-2">
                  <label>First Name</label>
                  <input type="text" id="firstName" class="form-control" />
                  <small class="error text-danger"></small>
                </div>

                <div class="col-md-6 mb-2">
                  <label>Last Name</label>
                  <input type="text" id="lastName" class="form-control" />
                  <small class="error text-danger"></small>
                </div>
              </div>
              <div class="mb-2">
                <label>Email</label>
                <input type="email" id="email" class="form-control" />
                <small class="error text-danger"></small>
              </div>
              <div class="row">
                <div class="col-md-6 mb-2">
                  <label>Phone</label>
                  <input
                    type="text"
                    id="phone"
                    class="form-control"
                    maxlength="10"
                  />
                  <small class="error text-danger"></small>
                </div>

                <div class="col-md-6 mb-2">
                  <label>PAN</label>
                  <input
                    type="text"
                    id="pan"
                    class="form-control"
                    maxlength="10"
                  />
                  <small class="error text-danger"></small>
                </div>
              </div>
              <div class="mb-2">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-control" />
                <small class="error text-danger"></small>
              </div>

              <div class="row">
                <div class="col-md-6 mb-2">
                  <label>Password</label>
                  <input type="text" id="password" class="form-control" />
                  <small class="error text-danger"></small>
                </div>

                <div class="col-md-6 mb-3">
                  <label>Conform Password</label>
                  <input
                    type="password"
                    id="conformpass"
                    class="form-control"
                  />
                  <small class="error text-danger"></small>
                </div>
              </div>

              <button type="submit" class="btn btn-auth w-100">
                <i class="bi bi-person-plus me-2"></i>Register
              </button>

              <p class="text-center mt-3">
                Already have account?
                <a href="index.html" class="auth-link">Login</a>
              </p>
            </form>
          </div>
        </div>
        <div
          class="col-md-6 auth-left d-flex flex-column justify-content-center align-items-center rounded-5"
        >
          <img src="images/quiz.jpeg" class="auth-img" alt="Quiz" />
          <h1>Hello Student!</h1>
          <p>Create your account and start your quiz journey.</p>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script/register.js"></script>
  </body>
</html>
