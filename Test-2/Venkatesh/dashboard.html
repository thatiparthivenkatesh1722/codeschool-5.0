<!doctype html>
<html>
  <head>
    <title>Quiz Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="css/dashboard.css" rel="stylesheet" />
  </head>

  <body class="bg-light">
    <div id="sidebarContainer"></div>
    <div id="sidebarOverlay"></div>
    <div id="mainContent" class="main-content">
      <div id="navbarContainer"></div>
      <div class="container-fluid p-4">
        <div
          class="card border-0 shadow-sm rounded-4 mb-4 bg-primary text-white"
        >
          <div class="card-body p-4">
            <h3 class="fw-bold">Welcome to Quiz Portal</h3>
            <p class="mb-3">
              Take quizzes, submit answers, and view your score instantly.
            </p>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="fw-bold mb-0">Choose Subject</h5>
              <span class="text-muted small"
                >Select a subject to start quiz</span
              >
            </div>

            <div class="row g-4" id="subjectCards"></div>
          </div>
        </div>
        <div class="row g-4"></div>

        <div class="row g-4 mt-5">
          <h3 class="fw-bold">Quiz Stats</h3>
          <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4">
              <div class="card-body text-center">
                <i class="bi bi-pencil-square fs-1 text-success"></i>
                <h4 class="fw-bold mt-2" id="attemptCount">0</h4>
                <p class="text-muted mb-0">Attempts</p>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4">
              <div class="card-body text-center">
                <i class="bi bi-trophy fs-1 text-warning"></i>
                <h4 class="fw-bold mt-2" id="bestScore">0</h4>
                <p class="text-muted mb-0">Best Score</p>
              </div>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4">
              <div class="card-body text-center">
                <i class="bi bi-people fs-1 text-danger"></i>
                <h4 class="fw-bold mt-2" id="studentCount">0</h4>
                <p class="text-muted mb-0">Students</p>
              </div>
            </div>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 mt-4">
          <div class="card-body">
            <h5 class="fw-bold">Recent Results</h5>
            <p class="text-muted mb-0">No quiz results available yet.</p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/layout.js"></script>
    <script src="script/dashboard.js"></script>
  </body>
</html>
