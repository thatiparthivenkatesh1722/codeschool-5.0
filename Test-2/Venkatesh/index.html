<!doctype html>
<html>
  <head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container-fluid auth-wrapper">
      <div class="row auth-box">
        <div
          class="col-md-6 auth-left d-flex flex-column justify-content-center align-items-center rounded-5"
        >
          <img src="images/quiz.jpeg" class="auth-img" alt="Quiz" />
          <h1>Welcome Back!</h1>
          <p>Login and continue your online quiz.</p>
        </div>

        <div
          class="col-md-6 d-flex align-items-center justify-content-center p-4"
        >
          <div class="card auth-card p-4">
            <div class="text-center mb-2">
              <i class="bi bi-person-circle" style="font-size: 4rem"></i>
              <h3 class="mt-3 fw-bold">Welcome Back</h3>
              <p>Sign in to continue</p>
            </div>

            <form id="loginForm">
              <div class="mb-2">
                <label>Email</label>
                <input type="text" id="email" class="form-control" />
                <div class="error"></div>
              </div>

              <div class="mb-3">
                <div
                  class="d-flex justify-content-between align-items-center mb-1"
                >
                  <label>Password</label>

                  <a
                    href="#"
                    class="forgot-link"
                    data-bs-toggle="modal"
                    data-bs-target="#forgotModal"
                  >
                    Forgot Password?
                  </a>
                </div>

                <input type="password" id="password" class="form-control" />
                <div class="error"></div>
              </div>

              <button type="submit" class="btn btn-auth w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
              </button>

              <p class="text-center mt-3">
                Don't have an account?
                <a href="register.html" class="auth-link">Register</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="forgotModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Reset Password</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <div id="stepEmail">
              <div class="mb-3">
                <label>Email</label>

                <input type="email" id="forgotEmail" class="form-control" />

                <small class="text-danger" id="forgotEmailError"></small>
              </div>

              <button class="btn btn-auth w-100" id="btnSendOTP">
                Send OTP
              </button>
            </div>

            <div id="stepOTP" style="display: none">
              <div class="mb-3">
                <label>Enter OTP</label>

                <input
                  type="text"
                  id="otp"
                  class="form-control"
                  maxlength="6"
                />

                <small class="text-danger" id="otpError"></small>
              </div>

              <div class="mb-3">
                <label>New Password</label>

                <input type="password" id="newPassword" class="form-control" />

                <small class="text-danger" id="newPasswordError"></small>
              </div>

              <div class="mb-3">
                <label>Confirm Password</label>

                <input
                  type="password"
                  id="confirmNewPassword"
                  class="form-control"
                />

                <small class="text-danger" id="confirmNewPasswordError"></small>
              </div>

              <div class="text-center mb-3">
                OTP expires in
                <span id="otpTimer" class="fw-bold text-danger"> 01:00 </span>
              </div>

              <button
                class="btn btn-auth w-100 mt-2 mb-2"
                id="btnResendOTP"
                style="display: none"
              >
                Resend OTP
              </button>

              <button class="btn btn-auth w-100 mt-2" id="btnResetPassword">
                Reset Password
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/index.js"></script>
  </body>
</html>
