<!doctype html>
<html>
  <head>
    <title>Quiz Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="css/dashboard.css" rel="stylesheet" />
  </head>

  <body class="bg-light">
    <div id="sidebarContainer"></div>
    <div id="sidebarOverlay"></div>
    <div id="mainContent" class="main-content">
      <div id="navbarContainer"></div>

      <div class="container-fluid p-4">
        <div class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4 text-center">
            <i class="bi bi-trophy-fill fs-1 text-warning"></i>
            <h3 class="fw-bold mt-3">Quiz Result</h3>

            <h1 class="text-primary fw-bold mt-3" id="scoreText">0 / 0</h1>

            <p class="text-muted mb-0" id="timeTakenText">
              Time Taken: 0 seconds
            </p>
          </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-3">
              <i class="bi bi-x-circle text-danger me-2"></i>
              Wrong Answers Review
            </h5>

            <div id="wrongAnswersBox">
              <p class="text-muted">Loading result...</p>
            </div>

            <a href="dashboard.html" class="btn btn-primary mt-3">
              Back to Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="script/layout.js"></script>
    <script src="script/result.js"></script>
  </body>
</html>
