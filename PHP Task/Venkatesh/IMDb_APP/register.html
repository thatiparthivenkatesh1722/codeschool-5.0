<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | IMDbapp</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="./images/imdb-favicon.webp"
      type="image/x-icon"
    />
    <style>
      body {
        background: #000;
        color: white;
        min-height: 100vh;
      }

      .logo {
        background: #f5c518;
        color: #000;
        font-weight: 900;
        font-size: 28px;
        padding: 4px 12px;
        border-radius: 5px;
      }

      .register-card {
        max-width: 450px;
        width: 100%;
        background: #1f1f1f;
        border-radius: 15px;
      }

      .form-control {
        height: 48px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark px-3">
      <div class="logo">IMDb</div>
      <button
        class="btn btn-outline-light"
        onclick="window.location.href = 'home.html'"
      >
        Home
      </button>
    </nav>

    <div
      class="container min-vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="register-card p-4 shadow">
        <h3 class="text-center text-warning fw-bold mb-2">Create account</h3>
        <p class="text-center text-secondary mb-4">
          Create your account to access reviews, ratings, and more.
        </p>

        <label class="form-label">Full Name</label>
        <input
          type="text"
          id="name"
          class="form-control mb-1"
          placeholder="Enter full name"
        />
        <small id="nameError" class="text-danger d-block mt-1"></small>

        <label class="form-label mt-3">Email</label>
        <input
          type="text"
          id="email"
          class="form-control mb-1"
          placeholder="Enter email"
        />
        <small id="emailError" class="text-danger d-block mt-1"></small>

        <label class="form-label mt-3">Phone Number</label>
        <input
          type="text"
          id="phone"
          class="form-control mb-1"
          placeholder="Enter 10 digit phone number"
        />
       

        <button class="btn btn-warning w-100 mt-4 fw-bold" id="registerBtn">
          Create account
        </button>

        <p class="text-center mt-4 mb-0">
          Already have an account?
          <a
            href="login.html"
            class="text-warning text-decoration-none fw-bold"
          >
            Sign in
          </a>
        </p>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/register.js"></script>
  </body>
</html>
