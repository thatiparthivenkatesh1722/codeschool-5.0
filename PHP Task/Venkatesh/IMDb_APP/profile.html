<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile | IMDb_APP</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="shortcut icon"
      href="./images/imdb-favicon.webp"
      type="image/x-icon"
    />
    <style>
      body {
        background: #000;
        color: white;
      }

      .profile-card {
        max-width: 500px;
        background: #1f1f1f;
        border-radius: 15px;
      }

      .logo {
        background: #f5c518;
        color: #000;
        font-weight: 900;
        padding: 3px 10px;
        border-radius: 5px;
      }
      .menu-overlay {
        position: fixed;
        inset: 0;
        background: #1f1f1f;
        z-index: 2000;
        display: none;
      }

      .close-menu {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #f5c518;
        border: none;
        font-size: 25px;
      }
       footer i {
        font-size: 22px;
        cursor: pointer;
      }

      footer i:hover {
        color: #f5c518;
      }
    </style>
  </head>

  <body>
    <div id="navbarContainer"></div>

    

    <div
      class="container d-flex justify-content-center align-items-center mt-5"
    >
      <div class="profile-card p-4 w-100">
        <h3 class="text-warning fw-bold mb-3">Edit Profile</h3>

        <label class="form-label">Name</label>
        <input type="text" id="name" class="form-control mb-1" />
        <small id="nameError" class="text-danger d-block mb-2"></small>

        <label class="form-label">Email</label>
        <input type="text" id="email" class="form-control mb-1" />
        <small id="emailError" class="text-danger d-block mb-2"></small>

        <label class="form-label">Phone</label>
        <input type="text" id="phone" class="form-control mb-1" />
        <small id="phoneError" class="text-danger d-block mb-3"></small>

        <button class="btn btn-warning w-100 fw-bold" id="updateProfileBtn">
          Update Profile
        </button>
      </div>
    </div>

    <footer class="bg-black text-white mt-5 pt-5 pb-3">
      <div class="container text-center">
        <div class="row justify-content-center">
          <div class="col-md-5">
            <div class="border rounded p-3">
              <h5 class="fw-bold mb-3">Follow IMDb on social</h5>
              <i class="bi bi-tiktok mx-2"></i>
              <i class="bi bi-instagram mx-2"></i>
              <i class="bi bi-twitter-x mx-2"></i>
              <i class="bi bi-youtube mx-2"></i>
              <i class="bi bi-facebook mx-2"></i>
            </div>
          </div>

          <div class="col-md-5">
            <div
              class="border rounded p-3 d-flex justify-content-between align-items-center"
            >
              <div>
                <h5 class="fw-bold">Get the IMDb App</h5>
                <p class="text-secondary">For Android and iOS</p>
              </div>
              <div>
                <img
                  src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=IMDb"
                />
              </div>
            </div>
          </div>
        </div>

        <div class="mt-4 small">
          <div class="mb-2">
            Help · Site Index · IMDbPro · Box Office Mojo · License IMDb Data
          </div>

          <div class="mb-2">
            Press Room · Advertising · Jobs · Conditions of Use · Privacy Policy
          </div>
        </div>

        <div class="mt-4 text-secondary small">an amazon company</div>

        <div class="text-secondary small mt-2">
          © 1990-2026 by IMDb.com, Inc.
        </div>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="scripts/common.js"></script>

    <script>
      $(document).ready(function () {
        $("#navbarContainer").load("./templates/navbar.html", function () {
          checkLoggedUser();
        });
      });
    </script>

    <script src="scripts/profile.js"></script>
  </body>
</html>
