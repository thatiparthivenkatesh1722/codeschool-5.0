<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | IMDb_APP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #000;
  color: white;
  min-height: 100vh;
}

.logo {
  background: #f5c518;
  color: #000;
  font-weight: 900;
  font-size: 28px;
  padding: 4px 12px;
  border-radius: 5px;
}

.login-card {
  max-width: 430px;
  width: 100%;
  background: #1f1f1f;
  border-radius: 15px;
}

.form-control {
  height: 48px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <div class="logo">IMDb</div>

  <button
    type="button"
    class="btn btn-outline-light"
    onclick="window.location.href='home.html'"
  >
    Home
  </button>
</nav>

<div class="container min-vh-100 d-flex justify-content-center align-items-center">
  <div class="login-card p-4 shadow">

    <h3 class="text-center fw-bold mb-2">Sign in</h3>
    <p class="text-center text-secondary mb-4">Login with OTP</p>

    <form id="loginForm">
      <label>Phone Number</label>
      <input type="text" id="phone" class="form-control mb-2">
      <small id="phoneError" class="text-danger d-block"></small>

      <button type="submit" class="btn btn-warning w-100 mt-3" id="sendOtpBtn">
        <span id="sendOtpText">Send OTP</span>
        <span id="sendOtpSpinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </form>

    <button type="button" id="resendOtpBtn" class="btn btn-outline-warning w-100 mt-2 d-none">
      Resend OTP
    </button>

    <hr>

    <form id="otpForm">
      <label>Enter OTP</label>
      <input type="text" id="otp" class="form-control mb-2">
      <small id="otpError" class="text-danger d-block"></small>
      <small id="otpTimer" class="text-warning d-block"></small>

      <button type="submit" class="btn btn-success w-100 mt-3" id="verifyOtpBtn">
        <span id="verifyOtpText">Verify OTP</span>
        <span id="verifyOtpSpinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </form>

    <p class="text-center mt-4 mb-0">
      New user?
      <a href="register.html" class="text-warning text-decoration-none fw-bold">
        Create account
      </a>
    </p>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="scripts/login.js"></script>

</body>
</html>
