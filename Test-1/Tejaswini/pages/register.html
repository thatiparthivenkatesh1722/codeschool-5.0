<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enjooy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: url("../images/login.webp") center center/cover;
      }
    </style>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div
        class="card shadow p-2 rounded-4 w-100"
        style="max-width: 500px; background-color: rgba(149, 175, 196, 0.95)"
      >
        <h3 class="text-center mb-1 text-dark">Register</h3>

        <div class="mb-1">
          <label>Username</label>
          <input type="text" id="username" class="form-control" />
          <div id="usernameError" class="text-danger small"></div>
        </div>

        <div class="mb-1">
          <label>Email</label>
          <input type="email" id="email" class="form-control mt-1" />
          <div id="emailError" class="text-danger small"></div>
        </div>

        <div class="mb-1">
          <label>Date of Birth</label>
          <input type="date" id="dob" class="form-control" />
          <div id="dobError" class="text-danger small"></div>
        </div>

        <div class="mb-1">
          <label>Phone Number</label>
          <input type="text" id="phone" class="form-control" />
          <div id="phoneError" class="text-danger small"></div>
        </div>

        <div class="mb-1">
          <label>PAN Card Number (e.g., ABCDE1234F)</label>
          <input type="text" id="pan" class="form-control" />
          <div id="panError" class="text-danger small"></div>
        </div>

        <div class="mb-2">
          <label>Password</label>
          <input type="password" id="password" class="form-control" />
          <div id="passwordError" class="text-danger small"></div>
        </div>

        <button
          id="registerBtn"
          class="btn w-100 text-white"
          style="background: #191918"
        >
          Register
        </button>

        <p class="text-center mt-2">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="../js/register.js"></script>
  </body>
</html>
