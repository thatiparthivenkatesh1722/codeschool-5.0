<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enjooy</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: url("../images/login.webp") center center/cover;
      }
    </style>
  </head>
  <body>
    
    <div
      class="container position-relative d-flex flex-column justify-content-center align-items-center vh-100 text-center"
    >
    <div class="text-center mb-4" style="margin-top: -70px;">
      <h1 class="fw-bold display-4 text-light">Enjooy</h1>
      <p class="fs-5 text-light display-3 fw-bold">Discover our latest news.</p>
    </div>
      <div class="card shadow p-4 border-0 rounded-4 w-100" style="max-width:500px; background-color:rgba(117, 164, 193, 0.95);">
        <h3 class="text-center mb-3 text-dark">Login</h3>
        
        <div class="mb-3 text-start">
          <label class="form-label">Username</label>
          <input
            type="text"
            placeholder="Enter username"
            id="username"
            class="form-control"
            required
          />
          <div id="usernameError" class="text-danger small mt-1"></div>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">Password</label>
          <input
            type="password"
            placeholder="Enter password"
            id="password"
            class="form-control"
            required
          />
          <div id="passwordError" class="text-danger small mt-1"></div>
        </div>
        <button type="button" id="loginBtn" class="btn w-100 text-white" style="background-color:#191918;" >
          Login
        </button>
       
      </div>
    </div>
    <script src="../js/login.js"></script>
   
    
  </body>
</html>
