<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        background-image: url("./Images/newsbg.jpg");
        background-size: cover;
        object-fit: cover;
        background-repeat: no-repeat;
        background-position: center;
        min-height: 100vh;
      }
      .btn {
        background-color: darkblue;
        color: white;
      }
      .btn:hover {
        background-color: darkblue;
      }
      h3 {
        color: darkblue;
      }
    </style>
  </head>
  <body>
    <button
      class="btn text-white d-block mx-auto fw-bold"
      data-bs-toggle="modal"
      data-bs-target="#exampleModal"
    >
      Open Login
    </button>
    <div class="modal fade" id="exampleModal">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-transparent border-0">
          <div
            class="container-fluid d-flex align-items-center justify-content-center"
          >
            <div
              class="row w-100 shadow rounded-4 overflow-hidden"
              style="max-width: 900px; background-color: rgba(0, 0, 0, 0.85)"
            >
              <div class="col-12 col-md-6 p-5">
                <h3 class="fw-bold mb-3">Stay Updated with Latest News</h3>
                <p class="text-secondary small">
                  Get real-time updates from trusted sources across politics,
                  technology, business, and more — all in one place.
                </p>

                <div class="mt-4">
                  <input
                    type="text"
                    id="username"
                    class="form-control mb-2"
                    placeholder="Enter username"
                  />
                  <p id="userError" class="text-danger small"></p>

                  <input
                    type="password"
                    id="password"
                    class="form-control mb-2"
                    placeholder="Enter password"
                  />
                  <p id="passError" class="text-danger small"></p>

                  <button class="btn w-100 fw-bold mt-2" id="loginBtn">
                    Login
                  </button>
                </div>
              </div>
              <div class="col-md-6 d-none d-md-block p-0">
                <img
                  src="./Images/breaknews.avif"
                  class="img-fluid h-100 w-100"
                  alt="movie image"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./Login.js"></script>
  </body>
</html>
