<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
      body {
        background-image: url("./Images/newsbg.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        min-height: 100vh;
      }
      .form-box {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background: #fff;
        border-radius: 10px;
      }
      .error {
        color: red;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="form-box">
      <h3 class="text-center mb-4">Create Your News Account</h3>

      <form id="registerForm">
        <input
          type="text"
          id="fname"
          class="form-control mb-2"
          placeholder="First Name"
        />
        <span class="error" id="fnameErr"></span>

        <input
          type="text"
          id="lname"
          class="form-control mb-2"
          placeholder="Last Name"
        />
        <span class="error" id="lnameErr"></span>

        <input
          type="tel"
          id="phone"
          class="form-control mb-2"
          placeholder="Phone Number"
        />
        <span class="error" id="phoneErr"></span>

        <input type="date" id="dob" class="form-control mb-2" />
        <span class="error" id="dobErr"></span>

        <input
          type="email"
          id="email"
          class="form-control mb-2"
          placeholder="Email"
        />
        <span class="error" id="emailErr"></span>

        <input
          type="text"
          id="username"
          class="form-control mb-2"
          placeholder="Username"
        />
        <span class="error" id="userErr"></span>

        <input
          type="password"
          id="password"
          class="form-control mb-2"
          placeholder="Password"
        />
        <span class="error" id="passErr"></span>

        <button class="btn btn-primary w-100 mt-3">Register</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="RegisterForm.js"></script>
  </body>
</html>
