<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles/Login.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-fluid d-flex flex-lg-row h-100 m-0 p-0">
      <div class="row w-100 mainContentRow g-0 m-0">
        <div class="col-lg-6 d-none d-lg-flex h-100 emptyCol"></div>
        <div
          class="col-11 col-lg-6 h-100 border-lg-end d-flex align-items-center bg-light m-0"
        >
          <div class="row w-100 d-flex justify-content-center m-0 g-0">
            <div
              class="col-md-10 col-12 ms-3 md-ms-0 col-lg-8 d-flex flex-column justify-content-center border rounded-4 bg-white shadow align-items-center"
            >
              <form class="p-4 w-100">
                <div>
                  <p class="display-6 justify-content-start fw-bold ms-3 login">
                    Login
                  </p>
                </div>
                <p class="d-none text-danger mb-1" id="credentialsValidate"></p>
                <div class="form-floating m-3">
                  <input
                    type="text"
                    class="form-control"
                    id="inputUsername"
                    aria-describedby="UserName"
                  />
                  <label for="inputUsername" class="form-label text-dark"
                    >Username</label
                  >
                </div>
                <p id="Username" class="d-none text-danger m-0"></p>
                <div class="form-floating m-3">
                  <input
                    type="password"
                    class="form-control"
                    id="inputPassword"
                  />
                  <label for="inputPassword" class="form-label text-dark"
                    >Password</label
                  >
                </div>
                <p id="Password" class="d-none text-danger"></p>
                <div class="d-flex justify-content-center">
                  <button
                    type="button"
                    class="btn btn-dark text-white px-5"
                    id="loginBtn"
                  >
                    <b>Login</b>
                  </button>
                </div>
              </form>
              <div class="d-flex">
                <p>or</p>
                <a href="./RegistationPage.html" class="ms-3"
                  ><span><b>SignUp</b></span></a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/Login.js"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
