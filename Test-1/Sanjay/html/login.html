<!doctype html>
<html lang="en">
  <head>
    <title>Login Page</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="stylesheet" href="../css/login.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>

  <body class="d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-6 col-lg-5 col-10 p-5 rounded-4 login-container">
      <h3 class="heading text-center text-dark">Login</h3>
      <div class="form-floating my-3">
        <input
          type="text"
          class="form-control w-100"
          id="floatingUsername"
          placeholder="Enter your Username:"
        />
        <label for="floatingUsername">Username</label>
      </div>
      <span class="text-danger" id="errUsername"></span>
      <div class="form-floating my-3">
        <input
          type="password"
          class="form-control w-100"
          id="floatingPassword"
          placeholder="Password"
        />
        <label for="floatingPassword">Password</label>
      </div>
      <span class="text-danger" id="errPasswd"></span>
      <div class="d-flex justify-content-center mt-4">
        <button class="btn text-white bg-dark fw-bolder w-50" id="loginBtn">
          Login
        </button>
      </div>
      <div class="d-flex justify-content-center m-3">
        <p class="text-center">Don't have an account <a href="./register.html">Sign up!!</a></p>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
