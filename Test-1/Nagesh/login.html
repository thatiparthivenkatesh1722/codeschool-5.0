<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jquery</title>
    <link rel="stylesheet" href="./styles/login.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100 bg-dark">
    <div class="login d-flex flex-column gap-3 py-3 px-2 w-25">
     
    
      <h3 class="text-center text-white fw-bold">Login</h3>
      <input
        type="text"
        id="username"
        placeholder="Enter the username"
        class="form-control bg-outline-primary"
      />
      <p id="usernameError" class="text-danger small"></p>
      <input
        type="password"
        id="password"
        placeholder="Enter the password"
        class="form-control bg-outline-primary"
      />
      <p id="passwordError" class="text-danger small"></p>
      <div class="button d-flexjustify-content-center align-items-center">
        <button id="loginBtn" class="btn btn-primary w-100  p-2 mb-2">
          Login
        </button>
      </div>
    </div>
    <script src="./scripts/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
