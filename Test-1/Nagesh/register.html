
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./styles/register.css">
</head>

<body class="">

<div class="container mt-5 vh-100">
  <div class="col-md-5 mx-auto card p-4 shadow">

    <h3 class="text-center">Register</h3>

    <input type="text" id="name" class="form-control mt-2" placeholder="Name">
    <small id="nameError" class="text-danger"></small>
    <input type="email" id="email" class="form-control mt-2" placeholder="Email">
    <small id="emailError" class="text-danger"></small>
    <input type="text" id="phone" class="form-control mt-2" placeholder="Phone Number">
    <small id="phoneError" class="text-danger"></small>
    <input type="date" id="dob" class="form-control mt-2">
    <small id="dobError" class="text-danger"></small>
    <input type="text" id="pan" class="form-control mt-2" placeholder="PAN Number">
    <small id="panError" class="text-danger"></small>
    <input type="password" id="password" class="form-control mt-2" placeholder="Password">
    <small id="passwordError" class="text-danger"></small>
    <button id="registerBtn" class="btn btn-primary w-100 mt-3">Register</button>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="./scripts/register.js"></script>

</body>
</html>
